<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock ChatGPT</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 24px 120px;
      }

      [data-message-author-role] {
        margin-bottom: 24px;
        padding: 20px;
        border-radius: 16px;
        background: #1f2937;
      }

      h2,
      p {
        margin: 0 0 12px;
      }

      pre {
        position: relative;
        overflow: auto;
        padding: 18px 20px;
        border-radius: 12px;
        background: #0f172a;
      }

      code {
        font-family: "Courier New", monospace;
        white-space: pre;
      }

      textarea {
        width: 100%;
        min-height: 150px;
        padding: 14px;
        border: 1px solid #374151;
        border-radius: 14px;
        background: #0f172a;
        color: #f9fafb;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <main>
      <div data-message-author-role="user" data-message-id="user-1">
        <p>Generate a tiny app file and keep the answer concise.</p>
        <time datetime="2026-02-28T04:00:00.000Z">2026-02-28 13:00</time>
      </div>

      <div data-message-author-role="assistant" data-message-id="assistant-1">
        <h2>Implementation</h2>
        <p>Use the following code block.</p>
        <a href="https://example.com/reference">Reference</a>
        <pre><code>// file: src/app.js
console.log("hello from mock");
</code></pre>
        <time datetime="2026-02-28T04:00:05.000Z">2026-02-28 13:00</time>
      </div>

      <label for="chat-input">Prompt</label>
      <textarea id="chat-input" data-testid="textbox"></textarea>
    </main>
  </body>
</html>
